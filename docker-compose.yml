# Local test stack for Murmur integration tests.
#
# LocalStack moved to a paid tier so we use open-source containers and AWS-provided free
# tools. Kinesis has no acceptable open-source local — Kinesis-touching tests run against
# a real AWS sandbox. Most pipelines can be exercised end-to-end on this stack with Kafka
# standing in for Kinesis.
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: murmur-dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  valkey:
    image: valkey/valkey:8-alpine
    container_name: murmur-valkey
    ports:
      - "6379:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]

  kafka:
    image: bitnami/kafka:latest
    container_name: murmur-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@localhost:9093"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongo:
    image: mongo:7
    container_name: murmur-mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

  minio:
    image: minio/minio:latest
    container_name: murmur-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: ["server", "/data", "--console-address", ":9001"]

  # Spark Connect server for local validation of pkg/exec/batch/sparkconnect.
  # Runs Spark in local[*] mode (no separate worker nodes) — sufficient to validate
  # the SQL → DataFrame → row-iteration → DDB write path. Production uses persistent
  # EMR with Spark Connect enabled.
  spark-connect:
    image: apache/spark:4.0.1
    container_name: murmur-spark-connect
    user: "0:0"
    ports:
      - "15002:15002"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      HOME: "/tmp"
    command:
      - /opt/spark/sbin/start-connect-server.sh
      - --master
      - "local[*]"
      - --conf
      - spark.connect.grpc.binding.port=15002
      - --conf
      - spark.connect.grpc.binding.address=0.0.0.0
      - --conf
      - spark.jars.ivy=/tmp/.ivy
