# Pipeline-spec for a Top-K products service backed by a Misra-Gries sketch.
#
# Run:
#   go run ./cmd/murmur-codegen-typed --in examples/typed-rpc-codegen/top-products/pipeline-spec.yaml \
#                                     --out examples/typed-rpc-codegen/top-products/_expected
#
# Emits:
#   _expected/top_products_service.proto         — ranked-items response shape
#   _expected/top_products_service_server.go     — delegates to typed.TopKClient
#
# The proto includes a `TopKItem { string key; int64 count; }` message and
# the response is a `repeated TopKItem items`.

proto_package: example.products.v1
go_package: github.com/example/storefront/gen/products/v1

service:
  name: TopProductsService
  pipeline_name: products_topk
  pipeline_kind: topk
  methods:
    - name: GetTop
      kind: get_all_time
      key_template: "category:{category_id}"
      request:
        - name: category_id
          type: string

    - name: GetTopWindow
      kind: get_window
      key_template: "category:{category_id}"
      window_duration_field: duration_seconds
      request:
        - name: category_id
          type: string
        - name: duration_seconds
          type: int64

    # Batched windowed read — one round-trip for N categories. Delegates
    # to typed.TopKClient.GetWindowMany; response is
    # `repeated TopKItemList entries` (proto3 disallows
    # repeated-of-repeated, so each entry wraps the per-category items).
    - name: GetTopWindowMany
      kind: get_window_many
      key_template: "category:{category_ids}"
      window_duration_field: duration_seconds
      many_key_field: category_ids
      request:
        - name: category_ids
          type: repeated string
        - name: duration_seconds
          type: int64

    # Batched all-time read with per-entity presence — delegates to
    # typed.TopKClient.GetMany. Response wraps each entity's ranking in
    # a TopKItemList plus a parallel present[] so callers can
    # distinguish "no entries" from "category not seen yet".
    - name: GetTopMany
      kind: get_many
      key_template: "category:{category_ids}"
      many_key_field: category_ids
      request:
        - name: category_ids
          type: repeated string

    # Merged ranking over an absolute time range. Delegates to
    # typed.TopKClient.GetRange; response is `repeated TopKItem items`.
    - name: GetTopRange
      kind: get_range
      key_template: "category:{category_id}"
      range_start_field: start_unix
      range_end_field: end_unix
      request:
        - name: category_id
          type: string
        - name: start_unix
          type: int64
        - name: end_unix
          type: int64
