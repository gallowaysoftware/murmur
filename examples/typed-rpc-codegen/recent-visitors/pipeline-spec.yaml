# Pipeline-spec for a recent-visitors-membership service backed by a Bloom filter.
#
# Run:
#   go run ./cmd/murmur-codegen-typed --in examples/typed-rpc-codegen/recent-visitors/pipeline-spec.yaml \
#                                     --out examples/typed-rpc-codegen/recent-visitors/_expected
#
# Emits:
#   _expected/recent_visitors_service.proto         — Bloom-shape response
#   _expected/recent_visitors_service_server.go     — delegates to typed.BloomClient
#
# The response carries the filter's structural metadata (capacity bits,
# hash count, approximate populated size). The boolean MIGHT-CONTAIN
# probe is server-internal; the typed wrapper exposes shape only —
# callers wanting per-element membership ride a follow-up RPC pattern
# (TBD; not yet covered by the codegen).

proto_package: example.visitors.v1
go_package: github.com/example/marketing/gen/visitors/v1

service:
  name: RecentVisitorsService
  pipeline_name: visitors_bloom
  pipeline_kind: bloom
  methods:
    - name: GetFilterShape
      kind: get_all_time
      key_template: "campaign:{campaign_id}"
      request:
        - name: campaign_id
          type: string

    # Batched windowed read — one round-trip for N campaigns. Delegates
    # to typed.BloomClient.GetWindowMany; response is `repeated BloomShape
    # entries` carrying the per-campaign filter structural metadata.
    - name: GetFilterShapeWindowMany
      kind: get_window_many
      key_template: "campaign:{campaign_ids}"
      window_duration_field: duration_seconds
      many_key_field: campaign_ids
      request:
        - name: campaign_ids
          type: repeated string
        - name: duration_seconds
          type: int64

    # Batched all-time read with per-entity presence. Delegates to
    # typed.BloomClient.GetMany; response wraps each entity's filter
    # shape in BloomShape plus a parallel present[].
    - name: GetFilterShapeMany
      kind: get_many
      key_template: "campaign:{campaign_ids}"
      many_key_field: campaign_ids
      request:
        - name: campaign_ids
          type: repeated string

    # Merged filter shape over an absolute time range. Delegates to
    # typed.BloomClient.GetRange.
    - name: GetFilterShapeRange
      kind: get_range
      key_template: "campaign:{campaign_id}"
      range_start_field: start_unix
      range_end_field: end_unix
      request:
        - name: campaign_id
          type: string
        - name: start_unix
          type: int64
        - name: end_unix
          type: int64
