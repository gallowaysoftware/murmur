syntax = "proto3";

package murmur.v1;

option go_package = "github.com/gallowaysoftware/murmur/proto/gen/murmur/v1;murmurv1";

// QueryService exposes Murmur's read-side merge for a single pipeline. Phase 1 ships a
// generic Value (bytes) shape; Phase 2 will codegen pipeline-typed responses
// (CounterResponse, HLLResponse, etc.) from the pipeline definition.
service QueryService {
  // Get returns the all-time aggregation value for entity (non-windowed pipelines).
  rpc Get(GetRequest) returns (Value);

  // GetWindow returns the aggregation merged across the bucket range covering the most
  // recent duration_seconds, ending at the server's "now".
  rpc GetWindow(GetWindowRequest) returns (Value);

  // GetRange returns the aggregation merged across the bucket range covering
  // [start_unix, end_unix].
  rpc GetRange(GetRangeRequest) returns (Value);

  // GetMany batches Get calls.
  rpc GetMany(GetManyRequest) returns (Values);
}

message GetRequest {
  string entity = 1;
}

message GetManyRequest {
  repeated string entities = 1;
}

message GetWindowRequest {
  string entity = 1;
  int64 duration_seconds = 2;
}

message GetRangeRequest {
  string entity = 1;
  int64 start_unix = 2;
  int64 end_unix = 3;
}

message Value {
  // present is false when no data exists for the requested entity (or window).
  bool present = 1;
  // data is the wire-encoded value. The encoding is monoid-specific:
  //   KindSum:    8-byte little-endian int64
  //   KindCount:  8-byte little-endian int64
  //   KindMin/Max:8-byte little-endian int64
  //   KindHLL:    axiomhq/hyperloglog marshaled form
  //   KindTopK:   custom binary (see pkg/monoid/sketch/topk)
  //   KindBloom:  bits-and-blooms/bloom marshaled form
  bytes data = 2;
}

message Values {
  repeated Value values = 1;
}
