syntax = "proto3";

package murmur.v1;

// go_package is set by buf's managed-mode override (see buf.gen.yaml).

// QueryService is Murmur's read-side data plane — applications hit it
// directly to get the merged aggregation value for a key (or for a
// window / range of keys). The same handler speaks gRPC, gRPC-Web, and
// Connect (HTTP+JSON) on a single port via Connect-RPC, so callers can
// pick whichever transport their client supports.
//
// Phase 1 ships a generic Value (bytes) shape so the service is monoid-
// agnostic; clients decode the bytes per the pipeline's monoid kind
// (int64-LE for Sum/Count/Min/Max, marshaled HLL/TopK/Bloom for sketches).
// Phase 2 will codegen pipeline-typed responses (CounterResponse,
// HLLResponse, etc.) so the wire format becomes self-describing.
//
// All RPCs follow the buf-STANDARD per-RPC response convention: each RPC
// has its own response message wrapping the shared Value payload, so a
// future field addition for one RPC doesn't force a schema change for the
// others.
service QueryService {
  // Get returns the all-time aggregation value for entity (non-windowed
  // pipelines).
  rpc Get(GetRequest) returns (GetResponse);

  // GetWindow returns the aggregation merged across the bucket range
  // covering the most recent `duration_seconds`, ending at the server's "now".
  rpc GetWindow(GetWindowRequest) returns (GetWindowResponse);

  // GetRange returns the aggregation merged across the bucket range
  // covering [start_unix, end_unix].
  rpc GetRange(GetRangeRequest) returns (GetRangeResponse);

  // GetMany batches Get calls. Response order matches request order so
  // callers can zip without an index map.
  rpc GetMany(GetManyRequest) returns (GetManyResponse);

  // GetWindowMany batches GetWindow calls across many entities in a single
  // round-trip. ONE underlying store fetch over (N entities × M buckets)
  // keys instead of N separate GetWindow calls; the win is at most N×
  // for ML-rerank-style use cases that fetch windowed counter features
  // for hundreds of candidates per query.
  rpc GetWindowMany(GetWindowManyRequest) returns (GetWindowManyResponse);

  // GetRangeMany is the absolute-range counterpart to GetWindowMany.
  rpc GetRangeMany(GetRangeManyRequest) returns (GetRangeManyResponse);

  // GetTrailing returns the aggregation merged across the trailing window
  // covering the most recent `duration_seconds`, ending at the server's
  // "now". Equivalent to GetWindow but documents the "trailing window"
  // intent (last-7d, last-30d) — and pairs with the matching builder
  // sugar `(*CounterBuilder).Trailing(durations...)` which sizes daily
  // retention from the requested durations.
  rpc GetTrailing(GetTrailingRequest) returns (GetTrailingResponse);

  // GetTrailingMany batches GetTrailing across many entities in one
  // round-trip — counterpart to GetWindowMany.
  rpc GetTrailingMany(GetTrailingManyRequest) returns (GetTrailingManyResponse);
}

// GetRequest is the input for Get — a single entity lookup.
message GetRequest {
  string entity = 1;

  // fresh_read, when true, bypasses any server-side caching/coalescing
  // layer and forces an authoritative read. Use this for read-your-writes
  // semantics (e.g. "the user just liked this — show their like count
  // INCLUDING the write they just made"). Default false; the default path
  // can serve cached / coalesced results within a small staleness budget.
  bool fresh_read = 2;
}

// GetManyRequest batches multiple entity lookups in one round-trip.
message GetManyRequest {
  repeated string entities = 1;
  bool fresh_read = 2;
}

// GetWindowRequest asks for a sliding-window merge.
message GetWindowRequest {
  string entity = 1;
  // Window duration in seconds (e.g. 86400 for last 24 h).
  int64 duration_seconds = 2;
  bool fresh_read = 3;
}

// GetRangeRequest asks for an absolute-time-range merge.
message GetRangeRequest {
  string entity = 1;
  int64 start_unix = 2;
  int64 end_unix = 3;
  bool fresh_read = 4;
}

// Value is the inner payload returned by Get / GetWindow / GetRange.
// `present` is false when no data exists for the requested entity (or
// window). `data` is the wire-encoded value; the encoding is monoid-
// specific (the QueryService comment lists the conventions).
message Value {
  bool present = 1;
  bytes data = 2;
}

// Per-RPC response wrappers. Sharing the inner Value is intentional — the
// payload is the same shape across RPCs, only the lookup semantics differ.

message GetResponse {
  Value value = 1;
}

message GetWindowResponse {
  Value value = 1;
}

message GetRangeResponse {
  Value value = 1;
}

message GetManyResponse {
  // Same length and order as the request's `entities`.
  repeated Value values = 1;
}

// GetWindowManyRequest fetches windowed merges for many entities in one
// round-trip. Equivalent to N separate GetWindow calls but uses ONE
// underlying store batch over all (entity, bucket) pairs.
message GetWindowManyRequest {
  repeated string entities = 1;
  int64 duration_seconds = 2;
  bool fresh_read = 3;
}

message GetWindowManyResponse {
  // Same length and order as the request's `entities`. Each value is the
  // merged windowed result for the corresponding entity. Missing entities
  // (no bucket data within the range) return the monoid Identity, with
  // present=true — windowed-empty is a legitimate result, not absence.
  repeated Value values = 1;
}

// GetRangeManyRequest is the absolute-range counterpart to
// GetWindowManyRequest.
message GetRangeManyRequest {
  repeated string entities = 1;
  int64 start_unix = 2;
  int64 end_unix = 3;
  bool fresh_read = 4;
}

message GetRangeManyResponse {
  repeated Value values = 1;
}

// GetTrailingRequest asks for a trailing-window merge. Semantically
// identical to GetWindowRequest; the separate RPC names the intent
// ("trailing 7-day count") and pairs with the trailing-builder sugar.
message GetTrailingRequest {
  string entity = 1;
  // Trailing-window duration in seconds (e.g. 604800 for trailing-7d,
  // 2592000 for trailing-30d).
  int64 duration_seconds = 2;
  bool fresh_read = 3;
}

message GetTrailingResponse {
  Value value = 1;
}

// GetTrailingManyRequest batches GetTrailing for many entities in one
// round-trip. Same single-store-fetch contract as GetWindowMany.
message GetTrailingManyRequest {
  repeated string entities = 1;
  int64 duration_seconds = 2;
  bool fresh_read = 3;
}

message GetTrailingManyResponse {
  // Same length and order as the request's `entities`. Missing entities
  // return the monoid Identity with present=true.
  repeated Value values = 1;
}
