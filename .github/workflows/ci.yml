name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-lint-and-test:
    name: Go (lint + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt diff:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        # Workspace mode: go.work composes the root module with
        # pkg/exec/batch/sparkconnect (its own module so non-Spark
        # consumers don't have to mirror the spark-connect-go fork-replace).
        # `go vet ./...` from root only sees the current module; we vet
        # the submodule separately.
        run: |
          go vet ./...
          (cd pkg/exec/batch/sparkconnect && go vet ./...)

      - name: go build
        # The web/ build pipeline isn't run in CI; place a stub so
        # pkg/admin/embed.go's go:embed directive resolves to a known path.
        run: |
          mkdir -p pkg/admin/dist
          [ -f pkg/admin/dist/README.md ] || echo placeholder > pkg/admin/dist/README.md
          go build ./...
          (cd pkg/exec/batch/sparkconnect && go build ./...)

      - name: unit tests
        run: |
          go test -short -race -timeout 120s ./...
          (cd pkg/exec/batch/sparkconnect && go test -short -race -timeout 120s ./...)

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: stub embed dir
        run: |
          mkdir -p pkg/admin/dist
          echo placeholder > pkg/admin/dist/README.md
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  web:
    name: Web UI (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: generate proto bindings
        # web/src/gen/ is .gitignored — TS bindings are regenerated from
        # ../proto via the buf config in web/buf.gen.yaml. Must run before
        # tsc / lint / build so the generated module paths exist.
        run: npx buf generate
      - name: typecheck
        run: npx tsc -b --noEmit
      - name: lint
        run: npm run lint
      - name: build
        run: npm run build

  integration:
    name: Deployed-shape integration (testcontainers)
    runs-on: ubuntu-latest
    # Parallel to the other jobs above. Builds the example Docker
    # images and runs them as containers against Kafka + DynamoDB-local
    # containers; catches what the in-process e2e tests can't see
    # (broken Dockerfiles, env-var schema drift, container networking
    # config mistakes).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: stub embed dir
        # pkg/admin/embed.go's go:embed needs the dist directory to
        # exist — the example Dockerfiles `go build` into a multi-stage
        # image that imports pkg/admin transitively.
        run: |
          mkdir -p pkg/admin/dist
          echo placeholder > pkg/admin/dist/README.md

      - name: integration tests
        # The `integration` build tag gates these tests out of the
        # default `go test ./...` run. Locally: `make test-deployed`.
        run: go test -tags=integration -timeout 15m -v ./test/integration/...
