# golangci-lint v2 config for Murmur.
# Run locally with `golangci-lint run ./...` or `make lint`.

version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - unparam
    - misspell
    - gocritic

  settings:
    revive:
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]
        - name: package-comments
          severity: warning
        - name: unused-parameter
          disabled: true
    staticcheck:
      checks: ["all", "-ST1003"]

  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: _test\.go
        linters:
          - revive
          - errcheck
          - unparam
      - path: proto/gen/
        linters:
          - revive
          - staticcheck
          - unused

# Formatters are separate from linters in golangci-lint v2. gofmt
# folds in the gofmt-check step the CI used to run as a standalone
# pre-step; with this enabled, `golangci-lint run` is the lint
# authority and the CI workflow can drop its duplicate `go vet` /
# gofmt steps.
formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - web/node_modules
      - proto/gen/
